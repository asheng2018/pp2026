apiVersion: v1
kind: Namespace
metadata:
  name: ab-payment
---
apiVersion: v1
kind: Secret
metadata:
  name: ab-payment-secrets
  namespace: ab-payment
type: Opaque
stringData:
  db-password: "changeme"
  redis-password: "changeme"
  jwt-secret: "your-jwt-secret-here"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ab-payment-config
  namespace: ab-payment
data:
  db-host: "postgres"
  db-port: "5432"
  db-name: "ab_payment"
  redis-addr: "redis:6379"
  nats-url: "nats://nats:4222"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: ab-payment
  labels:
    app: orchestrator
spec:
  replicas: 3
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      containers:
      - name: orchestrator
        image: ab-payment/orchestrator:latest
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9090
          name: grpc
        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: ab-payment-config
              key: db-host
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ab-payment-secrets
              key: db-password
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ab-payment-secrets
              key: redis-password
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: ab-payment-secrets
              key: jwt-secret
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator-svc
  namespace: ab-payment
spec:
  selector:
    app: orchestrator
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  - name: grpc
    port: 9090
    targetPort: 9090
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: ab-payment
  labels:
    app: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: ab-payment/gateway:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: ab-payment-config
              key: db-host
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ab-payment-secrets
              key: db-password
        resources:
          requests:
            cpu: 200m
            memory: 192Mi
          limits:
            cpu: 500m
            memory: 384Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-svc
  namespace: ab-payment
spec:
  selector:
    app: gateway
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  type: ClusterIP
