syntax = "proto3";
package merchant;
option go_package = "github.com/ab-payment-system/api/proto/merchant";

service MerchantService {
  rpc CreateOrder(CreateOrderRequest) returns (CreateOrderResponse);
  rpc GetOrder(GetOrderRequest) returns (GetOrderResponse);
  rpc CancelOrder(CancelOrderRequest) returns (CancelOrderResponse);
}

message CreateOrderRequest {
  string merchant_id = 1;
  string api_key = 2;
  string amount = 3;
  string currency = 4;
  string customer_email = 5;
  string customer_country = 6;
  string callback_url = 7;
  map<string,string> metadata = 8;
  string signature = 9; // HMAC signature
}

message CreateOrderResponse {
  string order_id = 1;
  string order_no = 2;
  string pay_url = 3;   // URL for iframe embed
  string status = 4;
  int64 expires_in = 5; // seconds
}

message GetOrderRequest { string order_id = 1; string merchant_id = 2; }
message GetOrderResponse {
  string order_id = 1;
  string order_no = 2;
  string amount = 3;
  string currency = 4;
  string status = 5;
  string created_at = 6;
}

message CancelOrderRequest { string order_id = 1; string merchant_id = 2; }
message CancelOrderResponse { bool success = 1; }
